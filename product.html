<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madar Product Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Basic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="productHtml">
    <div class="realBody">
        <section class="ultraDock">
            <section class="dock">
                <a href="">Full store</a>
                <button id="themeBtn">Turn dark</button>
                <a href="#trueH1">To top</a>
            </section>
            <div id="hamburgerNav">
                <button id="hamburgerBtn">⚙️</button>
            </div>
        </section>

        <section class="navigation">
            <div class="navigation-bar">
                <a href="index.html#aboutSection">Home</a>
                <a href="store.html">Store</a>
                <a href="#contactSection">Contact</a>
            </div>
        </section>

        <section class="product">
            <h1>Madar Product Page</h1>
            <div class="productFlex2">
                <img src="" alt="Item Image">
                <h2>Item Name</h2>
                <p>Item Description</p>
                <p>Item Category</p>
                <p>Item Stock</p>
                <p>Item Price</p>
            </div>
            <div class="productFlex">
                <button>Buy</button>
                <a href="store.html">Go back to Store</a>
            </div>
        </section>

        <footer id="contactSection">
            <h2>Contact Us</h2>
            <section class="footer-grid">
                <a href="https://instagram.com" target="_blank">Instagram</a>
                <a href="https://facebook.com" target="_blank">Facebook</a>
                <a href="https://youtube.com" target="_blank">YouTube</a>
                <a href="https://tiktok.com" target="_blank">TikTok</a>
                <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                <a href="">About</a>
                <a href="">Store</a>
                <a href="">Guide</a>
                <a href="">Reviews</a>
                <a href="">Contact</a>
            </section>
        </footer>
    </div>

    <script src="product.js"></script>
</body>
</html>
